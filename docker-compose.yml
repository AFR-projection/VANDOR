services:
  vandor:
    build:
      context: .
      args:
        POSTGRES_URL: ${POSTGRES_URL}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - vandor_storage:/app/public/storage
      - vandor_wa_auth:/app/.whatsapp-auth

volumes:
  vandor_storage:
  vandor_wa_auth:
