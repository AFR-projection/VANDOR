# VANDOR — Nginx reverse proxy
# Domain contoh: vandor.dataku.id atau dataku.id
# Setup: bash deploy/hostinger/configure-domain.sh vandor.dataku.id email@dataku.id

upstream vandor_app {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name vandor.dataku.id;

  client_max_body_size 64M;

  location /ping {
    proxy_pass http://vandor_app;
    access_log off;
  }

  location / {
    proxy_pass http://vandor_app;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;
  }
}
