# Push ke main → otomatis deploy ke VPS produksi (SSH + deploy.sh).
# Setup GitHub repo secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY
# Opsional: VPS_APP_DIR (default /var/www/vandor)
name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          envs: VPS_APP_DIR
          script: |
            set -euo pipefail
            APP_DIR="${VPS_APP_DIR:-/var/www/vandor}"
            echo "==> Deploy dari GitHub Actions (push main)"
            cd "${APP_DIR}"
            export VANDOR_APP_DIR="${APP_DIR}"
            bash deploy/hostinger/deploy.sh
        env:
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
